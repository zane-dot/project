services:
  postgres:
    image: postgres:15-alpine
    container_name: flathunt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flathunt
      POSTGRES_PASSWORD: flathunt
      POSTGRES_DB: flathunt
    ports:
      - '5433:5432'
    volumes:
      - flathunt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flathunt']
      interval: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flathunt_web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://flathunt:flathunt@postgres:5432/flathunt?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_change_me_change_me_32bytes!!}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  flathunt_pgdata:
